server:
  port: 8080

spring:
  application:
    name: gis-solution-work-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/gis_platform
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgis}
  sql:
    init:
      mode: always
      schema-locations: classpath:db/init.sql
      continue-on-error: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_uuid

knife4j:
  enable: true
